name: build-macos

# Builds the macOS app bundle (dist/TokenScope.app) with PyInstaller.
# Runs on every v* tag (and on demand) and attaches TokenScope-macos.zip
# to the matching GitHub release. The Windows .exe is still built locally.
#
# Code signing & notarization (optional, needs an Apple Developer account):
# when the repository secrets below are set, the app is signed with a
# "Developer ID Application" certificate (hardened runtime + entitlements),
# notarized by Apple and stapled — so downloads pass Gatekeeper with no
# malware warning. Without the secrets, the build falls back to an ad-hoc
# signature (runs on Apple Silicon, but Gatekeeper still warns on download).
#
#   MACOS_CERT_P12       base64 of the Developer ID Application .p12 export
#   MACOS_CERT_PASSWORD  password of that .p12
#   APPLE_TEAM_ID        10-char team ID (Apple Developer > Membership)
#   APPLE_ID             Apple ID email used for notarization
#   APPLE_APP_PASSWORD   app-specific password for that Apple ID
#                        (create at appleid.apple.com > Sign-In & Security)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    env:
      HAVE_SIGNING: ${{ secrets.MACOS_CERT_P12 != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pyinstaller pywebview pillow requests pyjwt

      - name: Generate tokenscope.icns from icon.py
        working-directory: desktop
        run: |
          python - <<'PY'
          import os
          from icon import make_icon
          os.makedirs('icon.iconset', exist_ok=True)
          for s in (16, 32, 128, 256, 512):
              make_icon(s).save(f'icon.iconset/icon_{s}x{s}.png')
              make_icon(s * 2).save(f'icon.iconset/icon_{s}x{s}@2x.png')
          PY
          iconutil -c icns icon.iconset -o tokenscope.icns

      - name: Build TokenScope.app
        working-directory: desktop
        run: pyinstaller --noconfirm tokenscope-macos.spec

      - name: Import Developer ID certificate
        if: env.HAVE_SIGNING == 'true'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 1800 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          rm "$RUNNER_TEMP/cert.p12"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::no 'Developer ID Application' identity found in MACOS_CERT_P12"
            exit 1
          fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Sign the app (Developer ID, hardened runtime)
        if: env.HAVE_SIGNING == 'true'
        working-directory: desktop
        run: |
          codesign --force --deep --timestamp --options runtime \
            --entitlements entitlements.plist \
            --sign "$SIGN_IDENTITY" dist/TokenScope.app
          codesign --verify --deep --strict --verbose=2 dist/TokenScope.app

      - name: Sign the app (ad-hoc fallback)
        if: env.HAVE_SIGNING != 'true'
        working-directory: desktop
        run: |
          echo "::warning::signing secrets not set — ad-hoc signature only, Gatekeeper will warn on download"
          codesign --force --deep --sign - dist/TokenScope.app

      - name: Notarize and staple
        if: env.HAVE_SIGNING == 'true'
        working-directory: desktop/dist
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent TokenScope.app notarize.zip
          xcrun notarytool submit notarize.zip --wait \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" --output-format json | tee notarize.json
          STATUS=$(python3 -c "import json;print(json.load(open('notarize.json')).get('status',''))")
          if [ "$STATUS" != "Accepted" ]; then
            SUBMISSION_ID=$(python3 -c "import json;print(json.load(open('notarize.json')).get('id',''))")
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" || true
            echo "::error::notarization status: $STATUS"
            exit 1
          fi
          xcrun stapler staple TokenScope.app
          rm notarize.zip notarize.json

      - name: Zip the app bundle
        working-directory: desktop/dist
        run: ditto -c -k --keepParent TokenScope.app TokenScope-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: TokenScope-macos
          path: desktop/dist/TokenScope-macos.zip

      - name: Attach to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/TokenScope-macos.zip

      - name: Clean up keychain
        if: always() && env.HAVE_SIGNING == 'true'
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
