name: build-windows

# Builds the Windows tray exe (dist/TokenScope.exe) with PyInstaller.
# Runs on every v* tag (and on demand) and attaches TokenScope.exe to the
# matching GitHub release.

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: desktop
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build TokenScope.exe
        working-directory: desktop
        run: pyinstaller --noconfirm tokenscope-tray.spec

      - uses: actions/upload-artifact@v4
        with:
          name: TokenScope-windows
          path: desktop/dist/TokenScope.exe

      - name: Attach to the GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/dist/TokenScope.exe
